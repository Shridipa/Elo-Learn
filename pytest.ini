[pytest]
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    ml: Machine learning tests
    db: Database tests
    api: API tests

asyncio_mode = auto
