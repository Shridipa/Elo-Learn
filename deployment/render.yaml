services:
  - type: web
    name: elo-learn-backend
    env: python
    region: oregon
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port 10000"
    envVars:
      - key: DATA_PATH
        value: "/opt/render/project/src/datasets"
      - key: RESULTS_PATH
        value: "/opt/render/project/src/results"
  - type: web
    name: elo-learn-frontend
    env: python
    region: oregon
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -m streamlit run frontend/dashboard.py --server.port 10001 --server.headless true"
